<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>健康助手 - 历史记录</title>
<link rel="stylesheet" href="style.css">
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/sync.js"></script>
</head>
<body>
<nav>
  <a href="index.html" class="logo">健康助手</a>
  <div class="nav-links">
    <a href="index.html">身体数据</a>
    <a href="period.html">经期日历</a>
    <a href="history.html" class="active">历史记录</a>
    <a href="analysis.html">AI 分析</a>
    <a href="privacy.html">隐私</a>
  </div>
  <div class="user-menu" id="userMenu" style="display:none">
    <span id="userEmail" style="font-size:.75em;color:#888"></span>
    <button class="btn-sm" onclick="signOut()">退出</button>
  </div>
</nav>

<div class="card">
  <h1>历史记录</h1>
  <p class="subtitle">趋势分析 · 数据导出</p>

  <div class="chart-tabs" id="chartTabs">
    <button class="chart-tab active" onclick="switchChart(0)">BMI / 体脂</button>
    <button class="chart-tab" onclick="switchChart(1)">周期长度</button>
    <button class="chart-tab" onclick="switchChart(2)">症状趋势</button>
  </div>
  <div class="chart-wrap" id="chart0">
    <canvas id="trendChart" width="420" height="220"></canvas>
    <div class="chart-legend">
      <span class="leg-bmi">BMI</span>
      <span class="leg-bf">体脂率 (%)</span>
    </div>
  </div>
  <div class="chart-wrap" id="chart1" style="display:none">
    <canvas id="cycleChart" width="420" height="220"></canvas>
    <div class="chart-legend">
      <span class="leg-bmi">周期天数</span>
      <span class="leg-bf">平均值</span>
    </div>
  </div>
  <div class="chart-wrap" id="chart2" style="display:none">
    <canvas id="symptomChart" width="420" height="220"></canvas>
    <div class="chart-legend">
      <span class="leg-bmi">痛经评分</span>
      <span class="leg-bf">睡眠 (h)</span>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn-sm" onclick="exportData()">导出 CSV</button>
    <button class="btn-sm" onclick="exportAllData()">导出全部 (JSON)</button>
    <button class="btn-sm danger" onclick="clearAllHistory()">清空记录</button>
  </div>
  <div class="history-list" id="historyList"></div>
</div>

<script>
async function renderHistory() {
  const list = document.getElementById('historyList');
  const data = await getHistory();
  if (!data.length) { list.innerHTML = '<div class="empty-msg">暂无记录</div>'; drawChart([]); return; }
  list.innerHTML = data.map((r, i) =>
    `<div class="history-item"><div class="info"><div class="date">${r.date}</div><div class="stats">BMI ${r.bmi} | 体脂 ${r.bf}% | TDEE ${r.tdee} kcal${r.whr ? ' | WHR ' + r.whr : ''}</div></div><button class="del-btn" onclick="deleteRecord(${i})">&times;</button></div>`
  ).join('');
  drawChart(data);
  drawCycleLengthChart();
  drawSymptomCharts();
}

async function deleteRecord(i) {
  if (!confirm('确定删除这条记录？')) return;
  const local = await getHistory();
  const record = local[i];
  local.splice(i, 1);
  localStorage.setItem('bmi_history', JSON.stringify(local));
  if (record?.id) {
    try { await apiFetch('bmi?id=' + record.id, { method: 'DELETE' }); } catch {}
  }
  await renderHistory();
}
async function clearAllHistory() {
  if (!confirm('确定清空所有记录？')) return;
  localStorage.removeItem('bmi_history');
  try { await apiFetch('bmi?all=true', { method: 'DELETE' }); } catch {}
  await renderHistory();
}
async function exportData() {
  const data = await getHistory();
  if (!data.length) return alert('暂无数据');
  const csv = '日期,BMI,体脂率,TDEE,腰臀比,体重,身高,年龄,性别\n' +
    data.map(r => `${r.date},${r.bmi},${r.bf},${r.tdee},${r.whr||''},${r.weight},${r.height},${r.age},${r.gender==='male'?'男':'女'}`).join('\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'bmi_records.csv'; a.click();
}

function drawChart(data) {
  const canvas = document.getElementById('trendChart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * dpr;
  canvas.height = 220 * dpr;
  ctx.scale(dpr, dpr);
  const W = canvas.offsetWidth, H = 220;
  ctx.clearRect(0, 0, W, H);

  if (data.length < 2) {
    ctx.fillStyle = '#ccc'; ctx.font = '14px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('至少需要 2 条记录才能显示趋势图', W / 2, H / 2);
    return;
  }

  const points = data.slice(0, 30).reverse();
  const pad = { t: 20, r: 20, b: 30, l: 40 };
  const cw = W - pad.l - pad.r, ch = H - pad.t - pad.b;

  const bmiMin = Math.min(...points.map(p => p.bmi)) - 2;
  const bmiMax = Math.max(...points.map(p => p.bmi)) + 2;
  const bfMin = Math.min(...points.map(p => p.bf)) - 3;
  const bfMax = Math.max(...points.map(p => p.bf)) + 3;

  function x(i) { return pad.l + (i / (points.length - 1)) * cw; }
  function yBmi(v) { return pad.t + (1 - (v - bmiMin) / (bmiMax - bmiMin)) * ch; }
  function yBf(v) { return pad.t + (1 - (v - bfMin) / (bfMax - bfMin)) * ch; }

  ctx.strokeStyle = '#eee'; ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const yy = pad.t + (i / 4) * ch;
    ctx.beginPath(); ctx.moveTo(pad.l, yy); ctx.lineTo(W - pad.r, yy); ctx.stroke();
  }

  ctx.fillStyle = '#bbb'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
  const step = Math.max(1, Math.floor(points.length / 6));
  for (let i = 0; i < points.length; i += step) ctx.fillText(points[i].date.slice(5, 10), x(i), H - 8);

  ctx.strokeStyle = '#667eea'; ctx.lineWidth = 2; ctx.beginPath();
  points.forEach((p, i) => { i === 0 ? ctx.moveTo(x(i), yBmi(p.bmi)) : ctx.lineTo(x(i), yBmi(p.bmi)); });
  ctx.stroke();
  points.forEach((p, i) => { ctx.fillStyle = '#667eea'; ctx.beginPath(); ctx.arc(x(i), yBmi(p.bmi), 3, 0, Math.PI * 2); ctx.fill(); });

  ctx.strokeStyle = '#ef5350'; ctx.lineWidth = 2; ctx.beginPath();
  points.forEach((p, i) => { i === 0 ? ctx.moveTo(x(i), yBf(p.bf)) : ctx.lineTo(x(i), yBf(p.bf)); });
  ctx.stroke();
  points.forEach((p, i) => { ctx.fillStyle = '#ef5350'; ctx.beginPath(); ctx.arc(x(i), yBf(p.bf), 3, 0, Math.PI * 2); ctx.fill(); });

  ctx.fillStyle = '#667eea'; ctx.font = '10px sans-serif'; ctx.textAlign = 'right';
  for (let i = 0; i <= 4; i++) { const v = bmiMin + (1 - i / 4) * (bmiMax - bmiMin); ctx.fillText(v.toFixed(1), pad.l - 4, pad.t + (i / 4) * ch + 4); }
  ctx.fillStyle = '#ef5350'; ctx.textAlign = 'left';
  for (let i = 0; i <= 4; i++) { const v = bfMin + (1 - i / 4) * (bfMax - bfMin); ctx.fillText(v.toFixed(1) + '%', W - pad.r + 4, pad.t + (i / 4) * ch + 4); }
}


function switchChart(idx) {
  document.querySelectorAll('.chart-wrap').forEach((el, i) => el.style.display = i === idx ? '' : 'none');
  document.querySelectorAll('.chart-tab').forEach((el, i) => el.classList.toggle('active', i === idx));
}

function drawCycleLengthChart() {
  const periodData = JSON.parse(localStorage.getItem('period_data') || '{}');
  const ranges = (periodData.ranges || []).filter(r => r.start && r.end);
  const canvas = document.getElementById('cycleChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * dpr;
  canvas.height = 220 * dpr;
  ctx.scale(dpr, dpr);
  const W = canvas.offsetWidth, H = 220;
  ctx.clearRect(0, 0, W, H);

  if (ranges.length < 2) {
    ctx.fillStyle = '#ccc'; ctx.font = '14px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('至少需要 2 次月经记录才能显示周期趋势', W / 2, H / 2);
    return;
  }

  const sorted = [...ranges].sort((a, b) => a.start.localeCompare(b.start));
  const cycles = [];
  for (let i = 1; i < sorted.length; i++) {
    const diff = Math.round((new Date(sorted[i].start) - new Date(sorted[i-1].start)) / 86400000);
    if (diff > 15 && diff < 60) cycles.push({ date: sorted[i].start, days: diff });
  }

  if (cycles.length < 2) {
    ctx.fillStyle = '#ccc'; ctx.font = '14px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('有效周期数据不足', W / 2, H / 2);
    return;
  }

  const points = cycles.slice(-20);
  const avg = points.reduce((s, p) => s + p.days, 0) / points.length;
  const std = Math.sqrt(points.reduce((s, p) => s + Math.pow(p.days - avg, 2), 0) / points.length);
  const pad = { t: 20, r: 20, b: 30, l: 40 };
  const cw = W - pad.l - pad.r, ch = H - pad.t - pad.b;
  const yMin = Math.min(avg - 2*std, ...points.map(p => p.days)) - 2;
  const yMax = Math.max(avg + 2*std, ...points.map(p => p.days)) + 2;

  function x(i) { return pad.l + (i / (points.length - 1)) * cw; }
  function y(v) { return pad.t + (1 - (v - yMin) / (yMax - yMin)) * ch; }

  // Grid
  ctx.strokeStyle = '#eee'; ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) { const yy = pad.t + (i / 4) * ch; ctx.beginPath(); ctx.moveTo(pad.l, yy); ctx.lineTo(W - pad.r, yy); ctx.stroke(); }

  // Std band
  ctx.fillStyle = 'rgba(102,126,234,0.08)';
  ctx.fillRect(pad.l, y(avg + std), cw, y(avg - std) - y(avg + std));

  // Average line
  ctx.strokeStyle = '#ef5350'; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(pad.l, y(avg)); ctx.lineTo(W - pad.r, y(avg)); ctx.stroke();
  ctx.setLineDash([]);

  // Line
  ctx.strokeStyle = '#667eea'; ctx.lineWidth = 2; ctx.beginPath();
  points.forEach((p, i) => { i === 0 ? ctx.moveTo(x(i), y(p.days)) : ctx.lineTo(x(i), y(p.days)); });
  ctx.stroke();
  points.forEach((p, i) => { ctx.fillStyle = '#667eea'; ctx.beginPath(); ctx.arc(x(i), y(p.days), 3, 0, Math.PI * 2); ctx.fill(); });

  // Labels
  ctx.fillStyle = '#bbb'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
  const step = Math.max(1, Math.floor(points.length / 6));
  for (let i = 0; i < points.length; i += step) ctx.fillText(points[i].date.slice(5, 10), x(i), H - 8);
  ctx.fillStyle = '#667eea'; ctx.font = '10px sans-serif'; ctx.textAlign = 'right';
  for (let i = 0; i <= 4; i++) { const v = yMin + (1 - i / 4) * (yMax - yMin); ctx.fillText(Math.round(v) + '天', pad.l - 4, pad.t + (i / 4) * ch + 4); }
  ctx.fillStyle = '#ef5350'; ctx.font = '10px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('均值 ' + avg.toFixed(1) + '天', W - pad.r + 4, y(avg) + 4);
}

function drawSymptomCharts() {
  const periodData = JSON.parse(localStorage.getItem('period_data') || '{}');
  const symptoms = periodData.symptoms || {};
  const canvas = document.getElementById('symptomChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * dpr;
  canvas.height = 220 * dpr;
  ctx.scale(dpr, dpr);
  const W = canvas.offsetWidth, H = 220;
  ctx.clearRect(0, 0, W, H);

  const entries = Object.entries(symptoms)
    .filter(([d, s]) => s.cramps > 0 || s.sleep)
    .sort((a, b) => a[0].localeCompare(b[0]))
    .slice(-30);

  if (entries.length < 3) {
    ctx.fillStyle = '#ccc'; ctx.font = '14px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('至少需要 3 天的症状记录', W / 2, H / 2);
    return;
  }

  const pad = { t: 20, r: 40, b: 30, l: 40 };
  const cw = W - pad.l - pad.r, ch = H - pad.t - pad.b;

  function x(i) { return pad.l + (i / (entries.length - 1)) * cw; }
  function yCramp(v) { return pad.t + (1 - v / 5) * ch; }
  function ySleep(v) { return pad.t + (1 - (v - 4) / 6) * ch; }

  // Grid
  ctx.strokeStyle = '#eee'; ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) { const yy = pad.t + (i / 4) * ch; ctx.beginPath(); ctx.moveTo(pad.l, yy); ctx.lineTo(W - pad.r, yy); ctx.stroke(); }

  // Cramps bars
  entries.forEach(([d, s], i) => {
    if (s.cramps > 0) {
      const barW = Math.max(4, cw / entries.length * 0.5);
      ctx.fillStyle = 'rgba(239,83,80,0.25)';
      ctx.fillRect(x(i) - barW/2, yCramp(s.cramps), barW, yCramp(0) - yCramp(s.cramps));
    }
  });

  // Cramps line
  ctx.strokeStyle = '#ef5350'; ctx.lineWidth = 2; ctx.beginPath();
  let started = false;
  entries.forEach(([d, s], i) => {
    if (s.cramps > 0) {
      started ? ctx.lineTo(x(i), yCramp(s.cramps)) : (ctx.moveTo(x(i), yCramp(s.cramps)), started = true);
    }
  });
  ctx.stroke();
  entries.forEach(([d, s], i) => {
    if (s.cramps > 0) { ctx.fillStyle = '#ef5350'; ctx.beginPath(); ctx.arc(x(i), yCramp(s.cramps), 3, 0, Math.PI * 2); ctx.fill(); }
  });

  // Sleep line
  ctx.strokeStyle = '#667eea'; ctx.lineWidth = 2; ctx.beginPath();
  started = false;
  entries.forEach(([d, s], i) => {
    if (s.sleep) {
      started ? ctx.lineTo(x(i), ySleep(parseFloat(s.sleep))) : (ctx.moveTo(x(i), ySleep(parseFloat(s.sleep))), started = true);
    }
  });
  ctx.stroke();
  entries.forEach(([d, s], i) => {
    if (s.sleep) { ctx.fillStyle = '#667eea'; ctx.beginPath(); ctx.arc(x(i), ySleep(parseFloat(s.sleep)), 3, 0, Math.PI * 2); ctx.fill(); }
  });

  // X labels
  ctx.fillStyle = '#bbb'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
  const step = Math.max(1, Math.floor(entries.length / 6));
  for (let i = 0; i < entries.length; i += step) ctx.fillText(entries[i][0].slice(5, 10), x(i), H - 8);

  // Y axes
  ctx.fillStyle = '#ef5350'; ctx.font = '10px sans-serif'; ctx.textAlign = 'right';
  for (let i = 0; i <= 5; i++) ctx.fillText(i, pad.l - 4, yCramp(i) + 4);
  ctx.fillStyle = '#667eea'; ctx.textAlign = 'left';
  for (let i = 0; i <= 3; i++) { const v = 4 + i * 2; ctx.fillText(v + 'h', W - pad.r + 4, ySleep(v) + 4); }
}

// Auth guard + init
(async () => {
  await initSupabase();
  const session = await getSession();
  if (session) {
    document.getElementById('userMenu').style.display = 'flex';
    document.getElementById('userEmail').textContent = session.user.email;
  }
  await renderHistory();
})();
</script>
</body>
</html>
