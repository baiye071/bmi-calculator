<div class="card">
  <h1>AI 智能分析</h1>

  <div id="dataSummary"></div>
  <div class="form-group" style="margin-bottom:16px">
    <label>API Key</label>
    <div style="display:flex;gap:8px">
      <input type="password" id="apiKeyInput" placeholder="输入你的 mimo API Key" style="flex:1;padding:11px 14px;border:2px solid #e8e8e8;border-radius:10px;font-size:.95em;outline:none;background:#fff">
      <button class="btn-sm" style="flex:none;padding:11px 16px" onclick="saveKey()">保存</button>

      <div class="icon">&#129504;</div>
      <p>点击上方按钮，AI 将根据你的身体数据和健康知识库<br>生成个性化的专业健康分析报告</p>
    </div>
  </div>
  <div class="report-actions" id="reportActions" style="display:none">

    <button class="btn-sm" onclick="downloadReport()">下载为文本</button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `你是一位温暖贴心的健康管理师，兼具医学专业知识和细腻的情感洞察力。你的角色不仅是医生，更是一位懂她的闺蜜——既专业可靠，又温暖共情。

## 交互风格
- **先共情，再建议**：先理解和认可用户的情绪状态，再给出专业建议
- **用"你"而非"患者"**：拉近距离，像朋友对话
- **避免冰冷的医学术语**：用生活化的语言解释专业概念
- **适时鼓励**：当数据有进步时，真诚地表扬；当数据不理想时，温和地引导
- **主动关怀**：如果发现情绪低落、睡眠不足、痛经严重等信号，主动表达关心

## 输出要求
1. 使用中文，Markdown 格式
2. 结构包含：
   - ## 💝 温暖开场（根据当前周期阶段和情绪数据，用一段温暖的话开头，像朋友的关心）
   - ## 📊 综合健康评估（整体评分+趋势，如有进步要表扬）
   - ## 🏋️ 体重管理分析（BMI/体脂解读+趋势）
   - ## 🍎 营养方案（个性化饮食计划+具体食物推荐）
   - ## 🏃 运动处方（运动类型、频率、强度）
   - ## ⚠️ 风险提示（温和指出，不制造焦虑）
   - 如果有月经数据：
     - ## 🌸 周期分析（经量、精力、痛经、睡眠趋势、症状统计、情绪分布）
     - ## 🧘‍♀️ 情绪关怀（根据情绪记录和周期阶段，给出心理调节建议+暖心鼓励）
3. **情绪响应规则**：
   - 如果用户记录了低落/焦虑/哭泣等负面情绪 → 先安慰，再建议，语气要温柔
   - 如果用户处于经期 → 关注痛经和疲劳，建议休息而非苛求自律
   - 如果用户处于卵泡期/排卵期 → 鼓励利用精力充沛的优势
   - 如果用户处于黄体期 → 提前预警 PMS，教她如何应对
   - 如果情绪数据总体平稳 → 表扬她的情绪管理能力
4. 在报告末尾加一段免责声明，但用温暖的语气而非冷冰冰的法律措辞`;

async function getData() {
  const [history, period] = await Promise.all([getHistory(), getPeriodData()]);
  return { history, period };
}

function buildPrompt(data) {
  const latest = data.history[0];
  if (!latest) return null;

  const isMale = latest.gender === 'male';

  // Build user data object for RAG matching
  const userData = {
    gender: latest.gender,
    bmi: latest.bmi,
    bf: latest.bf,
    whr: latest.whr || null,
    tdee: latest.tdee,
    age: latest.age,
    weight: latest.weight,
    height: latest.height,
    hasPeriod: !isMale && data.period.ranges && data.period.ranges.length > 0
  };

  // Compute avgCycle for period matching
  if (userData.hasPeriod && data.period.ranges.length >= 2) {
    const sorted = [...data.period.ranges].filter(r => r.start && r.end).sort((a, b) => a.start.localeCompare(b.start));
    if (sorted.length >= 2) {
      const cycles = [];
      for (let i = 1; i < sorted.length; i++) {
        const diff = Math.round((new Date(sorted[i].start) - new Date(sorted[i-1].start)) / 86400000);
        if (diff > 15 && diff < 60) cycles.push(diff);
      }
      if (cycles.length) userData.avgCycle = Math.round(cycles.reduce((a, b) => a + b, 0) / cycles.length);
    }
  }

  // RAG: retrieve relevant knowledge
  const relevantKnowledge = retrieveKnowledge(userData);

  let prompt = `## 用户身体数据\n`;
  prompt += `- 性别：${isMale ? '男' : '女'}\n`;
  prompt += `- 身高：${latest.height} cm\n`;
  prompt += `- 体重：${latest.weight} kg\n`;
  prompt += `- 年龄：${latest.age} 岁\n`;
  prompt += `- BMI：${latest.bmi}\n`;
  prompt += `- 体脂率：${latest.bf}%\n`;
  prompt += `- TDEE：${latest.tdee} kcal/天\n`;
  if (latest.whr) prompt += `- 腰臀比：${latest.whr}\n`;
  prompt += `- 记录时间：${latest.date}\n`;

  // History trends
  if (data.history.length >= 2) {
    const recent = data.history.slice(0, Math.min(10, data.history.length));
    prompt += `\n## 历史数据趋势（最近 ${recent.length} 次记录）\n`;
    prompt += `| 日期 | 体重 | BMI | 体脂率 | TDEE |\n|---|---|---|---|---|\n`;
    recent.reverse().forEach(r => {
      prompt += `| ${r.date} | ${r.weight}kg | ${r.bmi} | ${r.bf}% | ${r.tdee}kcal |\n`;
    });
    const firstW = recent[0].weight;
    const lastW = recent[recent.length - 1].weight;
    const wDiff = (lastW - firstW).toFixed(1);
    prompt += `\n体重变化趋势：${wDiff > 0 ? '增加' : wDiff < 0 ? '减少' : '稳定'} ${Math.abs(wDiff)} kg\n`;
  }

  // Period data (female)
  const ranges = data.period.ranges || [];
  if (!isMale && ranges.length > 0) {
    const completeRanges = ranges.filter(r => r.start && r.end);
    prompt += `\n## 月经周期数据\n`;
    prompt += `- 记录周期数：${ranges.length} 次\n`;
    if (completeRanges.length) {
      const allDays = completeRanges.reduce((sum, r) => {
        return sum + Math.round((new Date(r.end) - new Date(r.start)) / 86400000) + 1;
      }, 0);
      prompt += `- 经期总天数：${allDays} 天\n`;
      completeRanges.forEach((r, i) => {
        const dur = Math.round((new Date(r.end) - new Date(r.start)) / 86400000) + 1;
        prompt += `- 第${i+1}次：${r.start} ~ ${r.end}（${dur}天）\n`;
      });

      if (completeRanges.length >= 2) {
        const sorted = [...completeRanges].sort((a, b) => a.start.localeCompare(b.start));
        const cycles = [];
        for (let i = 1; i < sorted.length; i++) {
          const diff = Math.round((new Date(sorted[i].start) - new Date(sorted[i-1].start)) / 86400000);
          if (diff > 15 && diff < 60) cycles.push(diff);
        }
        if (cycles.length) {
          const avgCycle = Math.round(cycles.reduce((a, b) => a + b, 0) / cycles.length);
          const avgDuration = Math.round(completeRanges.reduce((s, r) => s + Math.round((new Date(r.end) - new Date(r.start)) / 86400000) + 1, 0) / completeRanges.length);
          prompt += `- 平均周期：${avgCycle} 天\n`;
          prompt += `- 平均经期天数：${avgDuration} 天\n`;
          prompt += `- 各次周期长度：${cycles.join(', ')} 天\n`;
          if (cycles.some(c => c < 21 || c > 35)) prompt += `- ⚠️ 存在周期异常（<21天或>35天）\n`;
        }
      } else {
        prompt += `- 经期次数不足 2 次，无法计算周期\n`;
      }
    }

    // Ovulation days
    if (data.period.ovulationDays && data.period.ovulationDays.length) {
      prompt += `- 用户标记排卵日：${data.period.ovulationDays.join(', ')}\n`;
    }

    // Current cycle phase (Bayesian)
    const lastRange = completeRanges.length ? completeRanges.reduce((a, b) => a.start > b.start ? a : b) : null;
    if (lastRange) {
      const today = new Date(); today.setHours(0,0,0,0);
      const lastStart = new Date(lastRange.start);
      const daysSinceStart = Math.floor((today - lastStart) / 86400000);
      const dur = Math.round((new Date(lastRange.end) - lastStart) / 86400000) + 1;

      // Bayesian weighted cycle
      let avgCycle = 30;
      if (completeRanges.length >= 2) {
        const sorted = [...completeRanges].sort((a, b) => a.start.localeCompare(b.start));
        const cycles = [];
        for (let i = 1; i < sorted.length; i++) {
          const diff = Math.round((new Date(sorted[i].start) - new Date(sorted[i-1].start)) / 86400000);
          if (diff > 15 && diff < 60) cycles.push(diff);
        }
        if (cycles.length) {
          let ws = 30 * 2, tw = 2;
          cycles.forEach((c, i) => { const w = Math.pow(0.7, cycles.length - 1 - i); ws += c * w; tw += w; });
          avgCycle = Math.round(ws / tw);
        }
      }

      const dayInCycle = daysSinceStart + 1;
      let phase, phaseEmoji, emotionHint;
      if (dayInCycle <= dur) {
        phase = '经期'; phaseEmoji = '🩸';
        emotionHint = '用户正处于经期，可能感到疲惫、情绪低落或痛经不适。请优先表达关心和安慰，建议休息和温补，不要苛求自律。';
      } else if (dayInCycle <= avgCycle - 14 - 4) {
        phase = '卵泡期'; phaseEmoji = '🌱';
        emotionHint = '用户处于卵泡期，精力逐渐恢复，情绪趋于积极。可以鼓励她利用这个黄金期安排运动和重要事务。';
      } else if (dayInCycle <= avgCycle - 14 + 2) {
        phase = '排卵期'; phaseEmoji = '🥚';
        emotionHint = '用户处于排卵期，精力和情绪处于最佳状态。可以给出积极正面的反馈，鼓励社交和运动。';
      } else {
        phase = '黄体期'; phaseEmoji = '🌙';
        emotionHint = '用户处于黄体期，可能出现 PMS 症状（情绪波动、食欲增加、乳房胀痛）。提前预警并教她如何应对，语气要温柔包容。';
      }
      prompt += `\n## 当前周期状态\n`;
      prompt += `- 今天是周期第 ${dayInCycle} 天（${phaseEmoji} ${phase}）\n`;
      prompt += `- 贝叶斯预测周期：${avgCycle} 天（${completeRanges.length} 个历史周期加权）\n`;
      prompt += `- 情绪引导提示：${emotionHint}\n`;
    }

    // Symptoms - detailed records
    const symptomEntries = Object.entries(data.period.symptoms || {});
    if (symptomEntries.length) {
      const isPeriodDay = (date) => ranges.some(r => date >= r.start && date <= r.end);
      prompt += `\n### 详细每日记录\n`;
      symptomEntries.sort((a,b) => a[0].localeCompare(b[0])).forEach(([date, s]) => {
        const isPeriod = isPeriodDay(date);
        prompt += `- **${date}**${isPeriod ? '（经期）' : ''}：`;
        const parts = [];
        if (s.flow && s.flow !== '无') parts.push('经量:' + s.flow);
        if (s.energy) parts.push('精力:' + s.energy + '/5');
        if (s.cramps) parts.push('痛经:' + s.cramps + '/5');
        if (s.sleep) parts.push('睡眠:' + s.sleep + 'h');
        if (s.weight) parts.push('体重:' + s.weight + 'kg');
        if (s.exercise && s.exercise !== '无') parts.push('运动:' + s.exercise + (s.exerciseMin ? s.exerciseMin + 'min' : ''));
        if (s.symptoms.length) parts.push('症状:' + s.symptoms.join(','));
        if (s.mood) parts.push('心情:' + s.mood);
        if (s.diet) parts.push('饮食:' + s.diet);
        if (s.notes) parts.push('备注:' + s.notes);
        prompt += (parts.length ? parts.join(' | ') : '无记录') + '\n';
      });

      // Statistical summary
      prompt += `\n### 经期症状统计分析\n`;
      const allSymptoms = {};
      const allMoods = {};
      let energySum = 0, energyCnt = 0, crampsSum = 0, crampsCnt = 0, sleepSum = 0, sleepCnt = 0;
      const periodSymptoms = [], nonPeriodSymptoms = [];
      symptomEntries.forEach(([date, s]) => {
        const isPeriod = isPeriodDay(date);
        (s.symptoms || []).forEach(sym => {
          allSymptoms[sym] = (allSymptoms[sym] || 0) + 1;
          (isPeriod ? periodSymptoms : nonPeriodSymptoms).push(sym);
        });
        if (s.mood) allMoods[s.mood] = (allMoods[s.mood] || 0) + 1;
        if (s.energy) { energySum += s.energy; energyCnt++; }
        if (s.cramps !== undefined && s.cramps > 0) { crampsSum += s.cramps; crampsCnt++; }
        if (s.sleep) { sleepSum += parseFloat(s.sleep); sleepCnt++; }
      });
      const sortedSymptoms = Object.entries(allSymptoms).sort((a,b) => b[1] - a[1]);
      if (sortedSymptoms.length) {
        prompt += `- 最常见症状 TOP5：${sortedSymptoms.slice(0,5).map(([s,c]) => s+'('+c+'次)').join('、')}\n`;
      }
      const sortedMoods = Object.entries(allMoods).sort((a,b) => b[1] - a[1]);
      if (sortedMoods.length) {
        const totalMood = Object.values(allMoods).reduce((a,b) => a+b, 0);
        prompt += `- 情绪分布：${sortedMoods.map(([m,c]) => m+' '+Math.round(c/totalMood*100)+'%').join('、')}\n`;
      }
      if (energyCnt) prompt += `- 平均精力水平：${(energySum/energyCnt).toFixed(1)}/5\n`;
      if (crampsCnt) prompt += `- 平均痛经程度：${(crampsSum/crampsCnt).toFixed(1)}/5\n`;
      if (sleepCnt) prompt += `- 平均睡眠时长：${(sleepSum/sleepCnt).toFixed(1)} 小时\n`;
      if (periodSymptoms.length) {
        const ps = {};
        periodSymptoms.forEach(s => ps[s] = (ps[s]||0)+1);
        const topPeriod = Object.entries(ps).sort((a,b) => b[1]-a[1]).slice(0,3);
        prompt += `- 经期最常见症状：${topPeriod.map(([s,c]) => s+'('+c+'次)').join('、')}\n`;
      }
    }
  }

  prompt += `\n## 相关健康知识参考（根据你的数据自动匹配）\n${relevantKnowledge}\n`;
  prompt += `\n请根据以上数据和参考知识，生成一份专业、详细、个性化的健康分析报告。`;
  return prompt;
}

function renderSummary(data) {
  const el = document.getElementById('dataSummary');
  const latest = data.history[0];
  if (!latest) {
    el.innerHTML = '<div class="empty-state"><div class="icon">&#128202;</div><p>暂无身体数据，请先去<a href="index.html" style="color:#667eea">首页</a>计算</p></div>';
    document.getElementById('genBtn').disabled = true;
    return;
  }

  let html = '<div class="data-summary">';
  html += `<span class="label">性别</span> <span class="value">${latest.gender === 'male' ? '男' : '女'}</span><span class="sep">|</span>`;
  html += `<span class="label">身高</span> <span class="value">${latest.height}cm</span><span class="sep">|</span>`;
  html += `<span class="label">体重</span> <span class="value">${latest.weight}kg</span><span class="sep">|</span>`;
  html += `<span class="label">年龄</span> <span class="value">${latest.age}岁</span><br>`;
  html += `<span class="label">BMI</span> <span class="value">${latest.bmi}</span><span class="sep">|</span>`;
  html += `<span class="label">体脂率</span> <span class="value">${latest.bf}%</span><span class="sep">|</span>`;
  html += `<span class="label">TDEE</span> <span class="value">${latest.tdee}kcal</span>`;
  if (latest.whr) html += `<span class="sep">|</span><span class="label">腰臀比</span> <span class="value">${latest.whr}</span>`;
  html += `<br><span class="label">历史记录</span> <span class="value">${data.history.length} 条</span>`;
  if (data.period.ranges && data.period.ranges.length) {
    html += `<span class="sep">|</span><span class="label">经期记录</span> <span class="value">${data.period.ranges.length} 次周期</span>`;
  }
  html += '</div>';
  el.innerHTML = html;
}

let fullReport = '';

async function saveKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) return;
  await setApiKey(key);
  document.getElementById('keyStatus').innerHTML = '<span style="color:#22c55e">Key 已保存</span>';
  setTimeout(() => { document.getElementById('keyStatus').innerHTML = ''; }, 2000);
}

async function generateReport() {
  const btn = document.getElementById('genBtn');
  const box = document.getElementById('reportBox');
  const actions = document.getElementById('reportActions');

  const apiKey = await getApiKey();
  if (!apiKey) {
    alert('请先输入并保存 API Key');
    document.getElementById('apiKeyInput').focus();
    return;
  }

  const data = await getData();
  const prompt = buildPrompt(data);
  if (!prompt) return alert('暂无数据，请先在首页计算身体数据');

  btn.disabled = true;
  btn.textContent = '正在分析...';
  actions.style.display = 'none';
  box.innerHTML = '<div style="text-align:center;padding:40px;color:#888"><div class="loading-dots" style="font-size:1.2em">AI 正在生成分析报告</div><br><span style="font-size:.78em;color:#aaa">这可能需要 10~30 秒</span></div>';

  fullReport = '';

  try {
    const resp = await fetch(API_CONFIG.baseUrl + '/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + apiKey
      },
      body: JSON.stringify({
        model: API_CONFIG.model,
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          { role: 'user', content: prompt }
        ],
        stream: true
      })
    });

    if (!resp.ok) {
      const errText = await resp.text();
      throw new Error(`API 请求失败 (${resp.status}): ${errText}`);
    }

    box.innerHTML = '';
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed || !trimmed.startsWith('data:')) continue;
        const payload = trimmed.slice(5).trim();
        if (payload === '[DONE]') continue;

        try {
          const json = JSON.parse(payload);
          const delta = json.choices?.[0]?.delta?.content;
          if (delta) {
            fullReport += delta;
            box.innerHTML = renderMarkdown(fullReport) + '<span class="typing-cursor"></span>';
            box.scrollTop = box.scrollHeight;
          }
        } catch {}
      }
    }

    box.innerHTML = renderMarkdown(fullReport);
    actions.style.display = 'flex';
  } catch (err) {
    box.innerHTML = `<div style="color:#ef5350;padding:20px"><b>请求失败：</b>${err.message}<br><br>请检查：<br>1. config.js 中的 API 地址和 Key 是否正确<br>2. 网络连接是否正常<br>3. API 服务是否可用</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '重新生成报告';
  }
}

function renderMarkdown(md) {
  return md
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
    .replace(/<\/ul>\s*<ul>/g, '')
    .replace(/^\|(.+)\|$/gm, function(match) {
      const cells = match.split('|').filter(c => c.trim());
      if (cells.every(c => /^[\s-]+$/.test(c))) return '';
      return '<tr>' + cells.map(c => '<td>' + c.trim() + '</td>').join('') + '</tr>';
    })
    .replace(/(<tr>.*<\/tr>)/gs, '<table style="width:100%;border-collapse:collapse;font-size:.85em;margin:8px 0">$1</table>')
    .replace(/<\/table>\s*<table[^>]*>/g, '')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>')
    .replace(/^(.+)$/gm, function(match) {
      if (match.startsWith('<h') || match.startsWith('<ul') || match.startsWith('<li') || match.startsWith('<tr') || match.startsWith('<table') || match.startsWith('<blockquote') || match.startsWith('</')) return match;
      return match;
    });
}

function copyReport() {
  navigator.clipboard.writeText(fullReport).then(() => {
    alert('报告已复制到剪贴板');
  });
}

function downloadReport() {
  const blob = new Blob([fullReport], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '健康分析报告_' + new Date().toISOString().slice(0, 10) + '.txt';
  a.click();
}

// Init
(async () => {
  await initSupabase();
  const session = await getSession();
  if (!session) {
    window.location.href = 'login.html';
    return;
  }
  document.getElementById('userMenu').style.display = 'flex';
  document.getElementById('userEmail').textContent = session.user.email;
  document.getElementById('apiKeyInput').value = await getApiKey();
  renderSummary(await getData());
})();
</script>
