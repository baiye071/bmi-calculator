<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>健康助手 - 今日健康</title>
<link rel="stylesheet" href="style.css">
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/sync.js"></script>
<script src="js/migrate.js"></script>
<script src="js/alerts.js"></script>
</head>
<body>
<nav>
  <a href="index.html" class="logo">健康助手</a>
  <div class="nav-links">
    <a href="index.html" class="active">今日健康</a>
    <a href="period.html">经期日历</a>
    <a href="history.html">历史记录</a>
    <a href="analysis.html">AI 分析</a>
    <a href="privacy.html">隐私</a>
  </div>
  <div class="user-menu" id="userMenu" style="display:none">
    <span id="userEmail" style="font-size:.75em;color:#888"></span>
    <button class="btn-sm" onclick="signOut()">退出</button>
  </div>
</nav>

<!-- Dashboard (shown for logged-in users with period data) -->
<div class="card" id="dashboardCard" style="display:none">
  <h1>今日健康</h1>
  <p class="subtitle" id="todayDate"></p>

  <div id="cyclePhaseCard" class="phase-card" style="display:none">
    <div class="phase-title" id="cyclePhaseTitle"></div>
    <div id="cyclePhaseAdvice" style="font-size:.82em;color:#555;line-height:1.7"></div>
  </div>

  <div id="nextPeriodRow" class="stats-row" style="display:none">
    <div class="stats-card" style="flex:2">
      <div class="val" id="nextPeriodValue" style="font-size:1em">--</div>
      <div class="lbl">预计下次月经</div>
    </div>
    <div class="stats-card">
      <div class="val" id="daysUntilValue">--</div>
      <div class="lbl">距今天数</div>
    </div>
  </div>

  <div id="quickCheckinCard" style="display:none;margin-top:12px">
    <div style="font-size:.85em;font-weight:700;color:#333;margin-bottom:10px">今日打卡</div>
    <div id="quickCheckinButtons"></div>
  </div>

  <div id="dashboardAlerts"></div>

  <div id="todayAdvice" style="display:none;margin-top:12px"></div>
</div>

<!-- Quick popup -->
<div id="quickPopup" class="quick-popup" style="display:none">
  <div class="quick-popup-inner">
    <div class="quick-popup-title" id="popupTitle"></div>
    <div class="quick-popup-options" id="popupOptions"></div>
    <button class="quick-popup-close" onclick="closeQuickPopup()">取消</button>
  </div>
</div>

<!-- BMI Calculator (collapsed for logged-in users) -->
<div class="card" id="bmiSection">
  <div style="display:flex;align-items:center;justify-content:space-between;cursor:pointer" onclick="toggleBmiSection()">
    <h2 style="font-size:1.1em;color:#333;margin:0">身体数据计算</h2>
    <span id="bmiToggle" style="font-size:1.2em;color:#888">&#9660;</span>
  </div>
  <div id="bmiContent" style="display:none">
    <p class="subtitle">BMI · 体脂率 · TDEE · 饮食建议</p>

    <div class="form-group">
      <label>性别</label>
      <div class="gender-group">
        <button class="gender-btn active" data-gender="male" onclick="setGender('male')">男</button>
        <button class="gender-btn" data-gender="female" onclick="setGender('female')">女</button>
      </div>
    </div>
    <div class="row">
      <div class="form-group"><label>身高 (cm)</label><input type="number" id="height" placeholder="170" min="50" max="250" step="0.1"></div>
      <div class="form-group"><label>体重 (kg)</label><input type="number" id="weight" placeholder="65" min="10" max="300" step="0.1"></div>
    </div>
    <div class="row">
      <div class="form-group"><label>年龄 (岁)</label><input type="number" id="age" placeholder="25" min="2" max="120"></div>
      <div class="form-group">
        <label>活动水平</label>
        <select id="activity">
          <option value="1.2">久坐不动</option>
          <option value="1.375">轻度活动（每周1-3次）</option>
          <option value="1.55" selected>中度活动（每周3-5次）</option>
          <option value="1.725">高度活动（每周6-7次）</option>
          <option value="1.9">极高活动（体力劳动/训练）</option>
        </select>
      </div>
    </div>
    <div class="row">
      <div class="form-group"><label>腰围 (cm) <span style="color:#aaa;font-weight:400">可选</span></label><input type="number" id="waist" placeholder="75" min="30" max="200" step="0.1"></div>
      <div class="form-group"><label>臀围 (cm) <span style="color:#aaa;font-weight:400">可选</span></label><input type="number" id="hip" placeholder="95" min="30" max="200" step="0.1"></div>
    </div>
    <button class="calc-btn" onclick="calculate()">开始计算</button>

    <div id="result" class="result hidden">
      <div class="result-card">
        <div class="result-label">BMI 指数</div>
        <div class="result-value" id="bmiValue">--</div>
        <span class="result-tag" id="bmiTag"></span>
        <div class="progress-bar"><div class="progress-fill" id="bmiBar"></div></div>
        <div class="scale"><span>15</span><span>18.5</span><span>24</span><span>28</span><span>40</span></div>
      </div>
      <div class="result-card">
        <div class="result-label">体脂率</div>
        <div class="result-value" id="bfValue">--%</div>
        <span class="result-tag" id="bfTag"></span>
        <div class="progress-bar"><div class="progress-fill" id="bfBar"></div></div>
        <div class="scale"><span>5%</span><span>15%</span><span>25%</span><span>35%</span><span>50%</span></div>
      </div>
      <div class="result-card">
        <div class="result-label">理想体重</div>
        <div class="result-value" id="idealValue">-- kg</div>
        <div class="result-sub" id="idealSub"></div>
      </div>
      <div class="result-card">
        <div class="result-label">每日热量消耗 (TDEE)</div>
        <div class="result-value" id="tdeeValue">-- kcal</div>
        <div class="result-sub" id="tdeeSub"></div>
      </div>
      <div class="result-card hidden" id="whrCard">
        <div class="result-label">腰臀比 (WHR)</div>
        <div class="result-value" id="whrValue">--</div>
        <span class="result-tag" id="whrTag"></span>
        <div class="progress-bar"><div class="progress-fill" id="whrBar"></div></div>
        <div class="scale"><span>0.7</span><span>0.8</span><span>0.9</span><span>1.0</span><span>1.1</span></div>
      </div>
      <div class="ref-table" id="refTable"></div>
      <div id="dietSection"></div>
    </div>
  </div>
</div>

<script>
// ============ Dashboard ============
function fmt(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

async function renderDashboard() {
  const session = await getSession();
  const today = new Date();
  const weekdays = ['日','一','二','三','四','五','六'];
  document.getElementById('todayDate').textContent =
    `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日 周${weekdays[today.getDay()]}`;

  if (!session) {
    document.getElementById('dashboardCard').style.display = 'none';
    document.getElementById('bmiContent').style.display = 'block';
    document.getElementById('bmiToggle').innerHTML = '&#9650;';
    return;
  }

  const data = await getPeriodData();
  if (!data.ranges.length) {
    document.getElementById('dashboardCard').style.display = 'block';
    document.getElementById('cyclePhaseCard').style.display = 'block';
    document.getElementById('cyclePhaseCard').innerHTML = '<div style="text-align:center;color:#bbb;font-size:.82em;padding:8px">在经期日历中标记月经开始和结束后，即可查看今日健康面板</div>';
    document.getElementById('bmiContent').style.display = 'block';
    document.getElementById('bmiToggle').innerHTML = '&#9650;';
    return;
  }

  document.getElementById('dashboardCard').style.display = 'block';
  const stats = getStats(data);
  const predictions = getPredictions(data);
  const last = data.ranges.filter(r => r.start && r.end).reduce((a, b) => a.start > b.start ? a : b);
  const dayInCycle = Math.floor((today - new Date(last.start)) / 86400000) + 1;
  const cycle = stats.avgCycle || 30;

  // Cycle phase card
  renderCyclePhaseCard(dayInCycle, cycle, stats);

  // Next period prediction
  if (predictions.nextPeriodRange) {
    const r = predictions.nextPeriodRange;
    const daysUntil = Math.ceil((new Date(r.mostLikely) - today) / 86400000);
    document.getElementById('nextPeriodValue').textContent = r.earliest + ' ~ ' + r.latest;
    document.getElementById('daysUntilValue').textContent = daysUntil >= 0 ? daysUntil + '天' : '--';
    document.getElementById('nextPeriodRow').style.display = 'flex';
  }

  // Quick check-in
  renderQuickCheckin(today, data);

  // Alerts
  const alerts = checkAbnormalities(data, stats);
  renderAlerts(alerts, 'dashboardAlerts');

  // Today's advice
  renderTodayAdvice(dayInCycle, cycle, stats);

  // Collapse BMI for logged-in users with data
  document.getElementById('bmiContent').style.display = 'none';
  document.getElementById('bmiToggle').innerHTML = '&#9660;';
}

function renderCyclePhaseCard(dayInCycle, cycle, stats) {
  const card = document.getElementById('cyclePhaseCard');
  const dur = stats.avgDuration || 5;
  let cls, icon, title, advice;
  if (dayInCycle <= dur) {
    cls = 'phase-period'; icon = '🩸'; title = '月经期（第' + dayInCycle + '天）';
    advice = '多吃补铁食物，轻度运动为主，注意保暖和充足睡眠。';
  } else if (dayInCycle <= cycle - 14 - 4) {
    cls = 'phase-follicular'; icon = '🌱'; title = '卵泡期（第' + dayInCycle + '天）';
    advice = '精力充沛，减脂黄金期。适合有氧运动和高强度工作。';
  } else if (dayInCycle <= cycle - 14 + 2) {
    cls = 'phase-ovulation'; icon = '🥚'; title = '预测排卵窗口（第' + dayInCycle + '天）';
    advice = '补充维生素E和Omega-3，运动量可适当加大。';
  } else {
    cls = 'phase-luteal'; icon = '🌙'; title = '黄体期（第' + dayInCycle + '天）';
    advice = '补充钙和镁，选择舒缓运动，注意PMS症状管理。';
  }
  card.className = 'phase-card ' + cls;
  card.innerHTML = `<div class="phase-title">${icon} ${title}</div><div>${advice}</div>`;
  card.style.display = 'block';
}

function renderTodayAdvice(dayInCycle, cycle, stats) {
  const dur = stats.avgDuration || 5;
  const el = document.getElementById('todayAdvice');
  let advice = '';
  if (dayInCycle <= dur) {
    advice = '<div class="diet-card"><div class="diet-title"><span class="icon">🩸</span> 经期温馨提示</div><ul class="diet-tips"><li>喝温热的红糖姜茶，避免生冷食物</li><li>可热敷缓解痛经，保证充足睡眠</li><li>轻度运动如散步、拉伸即可</li></ul></div>';
  } else if (dayInCycle <= cycle - 14 - 4) {
    advice = '<div class="diet-card"><div class="diet-title"><span class="icon">🌱</span> 卵泡期活力建议</div><ul class="diet-tips"><li>高蛋白饮食，补充绿叶蔬菜</li><li>有氧运动效果最佳</li><li>精力充沛，适合安排重要事务</li></ul></div>';
  } else if (dayInCycle <= cycle - 14 + 2) {
    advice = '<div class="diet-card"><div class="diet-title"><span class="icon">🥚</span> 排卵窗口营养建议</div><ul class="diet-tips"><li>补充维生素E（坚果、牛油果）</li><li>多吃十字花科蔬菜</li><li>力量训练效果好</li></ul></div>';
  } else {
    advice = '<div class="diet-card"><div class="diet-title"><span class="icon">🌙</span> 黄体期调理建议</div><ul class="diet-tips"><li>补充钙和镁（牛奶、香蕉、深色蔬菜）</li><li>控制食欲，可适当吃黑巧克力</li><li>减少咖啡因摄入，保持规律作息</li></ul></div>';
  }
  el.innerHTML = advice;
  el.style.display = 'block';
}

function renderQuickCheckin(today, data) {
  const todayStr = fmt(today);
  const record = data.symptoms[todayStr];
  const card = document.getElementById('quickCheckinCard');
  const btns = document.getElementById('quickCheckinButtons');

  const hasMood = record?.mood;
  const hasCramps = record?.cramps !== undefined && record?.cramps > 0;
  const hasSleep = record?.sleep;
  const hasExercise = record?.exercise && record.exercise !== '无';
  const hasWeight = record?.weight;

  btns.innerHTML = `
    <div class="quick-btn-row">
      <button class="quick-btn ${hasMood ? 'active' : ''}" onclick="quickLog('mood', '心情', ['😊 好','😐 一般','😔 差'])">😊 心情</button>
      <button class="quick-btn ${hasCramps ? 'active' : ''}" onclick="quickLog('cramps', '痛经程度', ['0 无痛','1 轻微','2 轻微','3 中度','4 剧烈','5 剧烈'])">🤕 痛经</button>
      <button class="quick-btn ${hasSleep ? 'active' : ''}" onclick="quickLogSleep()">😴 睡眠</button>
    </div>
    <div class="quick-btn-row">
      <button class="quick-btn ${hasExercise ? 'active' : ''}" onclick="quickLog('exercise', '运动', ['无','散步','瑜伽','跑步','游泳','力量训练'])">🏃 运动</button>
      <button class="quick-btn ${hasWeight ? 'active' : ''}" onclick="quickLogWeight()">⚖️ 体重</button>
    </div>
  `;
  card.style.display = 'block';
}

let _quickField = '', _quickTitle = '';

function quickLog(field, title, options) {
  _quickField = field;
  _quickTitle = title;
  document.getElementById('popupTitle').textContent = title;
  document.getElementById('popupOptions').innerHTML = options.map(o =>
    `<button class="quick-popup-opt" onclick="selectQuickOption('${o}')">${o}</button>`
  ).join('');
  document.getElementById('quickPopup').style.display = 'flex';
}

function quickLogSleep() {
  _quickField = 'sleep';
  _quickTitle = '睡眠时长';
  document.getElementById('popupTitle').textContent = '睡眠时长（小时）';
  document.getElementById('popupOptions').innerHTML = `
    <input type="number" id="popupSleepInput" min="0" max="24" step="0.5" placeholder="如 7.5" style="width:100%;padding:10px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:.95em;text-align:center;outline:none">
    <button class="quick-popup-opt" onclick="selectQuickSleep()" style="width:100%;margin-top:8px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none">确认</button>
  `;
  document.getElementById('quickPopup').style.display = 'flex';
}

function quickLogWeight() {
  _quickField = 'weight';
  _quickTitle = '今日体重';
  document.getElementById('popupTitle').textContent = '体重（kg）';
  document.getElementById('popupOptions').innerHTML = `
    <input type="number" id="popupWeightInput" min="20" max="300" step="0.1" placeholder="如 55.5" style="width:100%;padding:10px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:.95em;text-align:center;outline:none">
    <button class="quick-popup-opt" onclick="selectQuickWeight()" style="width:100%;margin-top:8px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none">确认</button>
  `;
  document.getElementById('quickPopup').style.display = 'flex';
}

async function selectQuickOption(value) {
  const todayStr = fmt(new Date());
  const data = await getPeriodData();
  if (!data.symptoms[todayStr]) {
    data.symptoms[todayStr] = { symptoms: [], mood: '', flow: '', energy: 0, cramps: 0, sleep: '', weight: '', exercise: '', exerciseMin: '', diet: '', notes: '' };
  }
  if (_quickField === 'cramps') {
    data.symptoms[todayStr].cramps = parseInt(value);
  } else if (_quickField === 'mood') {
    data.symptoms[todayStr].mood = value;
  } else if (_quickField === 'exercise') {
    data.symptoms[todayStr].exercise = value;
  }
  await savePeriodData(data);
  closeQuickPopup();
  await renderDashboard();
}

async function selectQuickSleep() {
  const val = document.getElementById('popupSleepInput').value;
  if (!val) return;
  const todayStr = fmt(new Date());
  const data = await getPeriodData();
  if (!data.symptoms[todayStr]) {
    data.symptoms[todayStr] = { symptoms: [], mood: '', flow: '', energy: 0, cramps: 0, sleep: '', weight: '', exercise: '', exerciseMin: '', diet: '', notes: '' };
  }
  data.symptoms[todayStr].sleep = val;
  await savePeriodData(data);
  closeQuickPopup();
  await renderDashboard();
}

async function selectQuickWeight() {
  const val = document.getElementById('popupWeightInput').value;
  if (!val) return;
  const todayStr = fmt(new Date());
  const data = await getPeriodData();
  if (!data.symptoms[todayStr]) {
    data.symptoms[todayStr] = { symptoms: [], mood: '', flow: '', energy: 0, cramps: 0, sleep: '', weight: '', exercise: '', exerciseMin: '', diet: '', notes: '' };
  }
  data.symptoms[todayStr].weight = val;
  await savePeriodData(data);
  closeQuickPopup();
  await renderDashboard();
}

function closeQuickPopup() {
  document.getElementById('quickPopup').style.display = 'none';
}

function toggleBmiSection() {
  const content = document.getElementById('bmiContent');
  const toggle = document.getElementById('bmiToggle');
  if (content.style.display === 'none') {
    content.style.display = 'block';
    toggle.innerHTML = '&#9650;';
  } else {
    content.style.display = 'none';
    toggle.innerHTML = '&#9660;';
  }
}

// ============ BMI Calculator ============
let gender = 'male';
function setGender(g) {
  gender = g;
  document.querySelectorAll('.gender-btn').forEach(b => b.classList.toggle('active', b.dataset.gender === g));
}

async function calculate() {
  const h = parseFloat(document.getElementById('height').value);
  const w = parseFloat(document.getElementById('weight').value);
  const a = parseInt(document.getElementById('age').value);
  if (!h || !w || !a) return alert('请填写身高、体重和年龄');

  const hm = h / 100;
  const bmi = w / (hm * hm);
  const bf = gender === 'male' ? 1.20 * bmi + 0.23 * a - 16.2 : 1.20 * bmi + 0.23 * a - 5.4;
  const isMale = gender === 'male';

  document.getElementById('bmiValue').textContent = bmi.toFixed(1);
  const bmiTag = document.getElementById('bmiTag');
  let bmiClass, bmiText;
  if (bmi < 18.5) { bmiClass = 'tag-underweight'; bmiText = '偏瘦'; }
  else if (bmi < 24) { bmiClass = 'tag-normal'; bmiText = '正常'; }
  else if (bmi < 28) { bmiClass = 'tag-overweight'; bmiText = '偏胖'; }
  else { bmiClass = 'tag-obese'; bmiText = '肥胖'; }
  bmiTag.className = 'result-tag ' + bmiClass;
  bmiTag.textContent = bmiText;
  const bmiPct = Math.min(100, Math.max(0, (bmi - 15) / 25 * 100));
  document.getElementById('bmiBar').style.width = bmiPct + '%';
  document.getElementById('bmiBar').style.background = bmi < 18.5 ? '#42a5f5' : bmi < 24 ? '#66bb6a' : bmi < 28 ? '#ffa726' : '#ef5350';

  const bfClamped = Math.max(2, Math.min(60, bf));
  document.getElementById('bfValue').textContent = bfClamped.toFixed(1) + '%';
  const bfTag = document.getElementById('bfTag');
  let bfClass, bfText;
  if (isMale) {
    if (bfClamped < 15) { bfClass = 'tag-underweight'; bfText = '偏瘦'; }
    else if (bfClamped < 20) { bfClass = 'tag-normal'; bfText = '正常'; }
    else if (bfClamped < 25) { bfClass = 'tag-overweight'; bfText = '偏胖'; }
    else { bfClass = 'tag-obese'; bfText = '肥胖'; }
  } else {
    if (bfClamped < 20) { bfClass = 'tag-underweight'; bfText = '偏瘦'; }
    else if (bfClamped < 25) { bfClass = 'tag-normal'; bfText = '正常'; }
    else if (bfClamped < 30) { bfClass = 'tag-overweight'; bfText = '偏胖'; }
    else { bfClass = 'tag-obese'; bfText = '肥胖'; }
  }
  bfTag.className = 'result-tag ' + bfClass;
  bfTag.textContent = bfText;
  const bfPct = Math.min(100, Math.max(0, (bfClamped - 5) / 45 * 100));
  document.getElementById('bfBar').style.width = bfPct + '%';
  document.getElementById('bfBar').style.background = bfClass === 'tag-underweight' ? '#42a5f5' : bfClass === 'tag-normal' ? '#66bb6a' : bfClass === 'tag-overweight' ? '#ffa726' : '#ef5350';

  const idealW = 22 * hm * hm;
  const minW = 18.5 * hm * hm;
  const maxW = 24 * hm * hm;
  document.getElementById('idealValue').textContent = idealW.toFixed(1) + ' kg';
  const diff = w - idealW;
  let advice;
  if (Math.abs(diff) < 1) advice = '你的体重非常接近理想值，继续保持！';
  else if (diff > 0) advice = `建议减重约 <b>${diff.toFixed(1)} kg</b>，健康范围 ${minW.toFixed(1)}~${maxW.toFixed(1)} kg`;
  else advice = `建议增重约 <b>${(-diff).toFixed(1)} kg</b>，健康范围 ${minW.toFixed(1)}~${maxW.toFixed(1)} kg`;
  document.getElementById('idealSub').innerHTML = advice;

  const act = parseFloat(document.getElementById('activity').value);
  const bmr = isMale ? 10 * w + 6.25 * h - 5 * a + 5 : 10 * w + 6.25 * h - 5 * a - 161;
  const tdee = bmr * act;
  document.getElementById('tdeeValue').textContent = Math.round(tdee) + ' kcal';
  document.getElementById('tdeeSub').innerHTML = `基础代谢 <b>${Math.round(bmr)}</b> kcal | 减脂目标 <b>${Math.round(tdee * 0.8)}</b> kcal | 增肌目标 <b>${Math.round(tdee * 1.15)}</b> kcal`;

  const waist = parseFloat(document.getElementById('waist').value);
  const hip = parseFloat(document.getElementById('hip').value);
  const whrCard = document.getElementById('whrCard');
  if (waist && hip) {
    whrCard.classList.remove('hidden');
    const whr = waist / hip;
    document.getElementById('whrValue').textContent = whr.toFixed(2);
    const whrTag = document.getElementById('whrTag');
    let whrClass, whrText;
    if (isMale) {
      if (whr < 0.90) { whrClass = 'tag-normal'; whrText = '正常'; }
      else if (whr < 1.0) { whrClass = 'tag-overweight'; whrText = '风险'; }
      else { whrClass = 'tag-obese'; whrText = '高风险'; }
    } else {
      if (whr < 0.80) { whrClass = 'tag-normal'; whrText = '正常'; }
      else if (whr < 0.85) { whrClass = 'tag-overweight'; whrText = '风险'; }
      else { whrClass = 'tag-obese'; whrText = '高风险'; }
    }
    whrTag.className = 'result-tag ' + whrClass;
    whrTag.textContent = whrText;
    const whrPct = Math.min(100, Math.max(0, (whr - 0.7) / 0.4 * 100));
    document.getElementById('whrBar').style.width = whrPct + '%';
    document.getElementById('whrBar').style.background = whrClass === 'tag-normal' ? '#66bb6a' : whrClass === 'tag-overweight' ? '#ffa726' : '#ef5350';
  } else { whrCard.classList.add('hidden'); }

  let ref = `<span>BMI：</span>偏瘦 &lt;18.5 | 正常 18.5~23.9 | 偏胖 24~27.9 | 肥胖 ≥28<br>`;
  ref += `<span>体脂率（${isMale ? '男' : '女'}）：</span>${isMale ? '偏瘦 &lt;15% | 正常 15%~20% | 偏胖 20%~25% | 肥胖 ≥25%' : '偏瘦 &lt;20% | 正常 20%~25% | 偏胖 25%~30% | 肥胖 ≥30%'}`;
  if (waist && hip) ref += `<br><span>腰臀比（${isMale ? '男' : '女'}）：</span>${isMale ? '正常 &lt;0.90 | 风险 0.90~0.99 | 高风险 ≥1.00' : '正常 &lt;0.80 | 风险 0.80~0.84 | 高风险 ≥0.85'}`;
  ref += `<br><span style="color:#aaa">* 体脂率采用 BMI 估算法，仅供参考</span>`;
  document.getElementById('refTable').innerHTML = ref;
  document.getElementById('result').classList.remove('hidden');

  const goal = bmi < 18.5 ? 'gain' : bmi < 24 ? 'maintain' : 'lose';
  const targetCal = goal === 'lose' ? Math.round(tdee * 0.8) : goal === 'gain' ? Math.round(tdee * 1.15) : Math.round(tdee);
  const proteinG = Math.round(w * (isMale ? (goal === 'lose' ? 2.0 : goal === 'gain' ? 1.8 : 1.5) : (goal === 'lose' ? 1.6 : goal === 'gain' ? 1.5 : 1.2)));
  const fatPct = isMale ? 0.25 : 0.30;
  const fatCal = Math.round(targetCal * fatPct);
  const fatG = Math.round(fatCal / 9);
  const carbCal = targetCal - proteinG * 4 - fatCal;
  const carbG = Math.max(0, Math.round(carbCal / 4));

  const dietSection = document.getElementById('dietSection');
  let dietHTML = '';
  if (goal === 'lose') {
    const foods = isMale ? '<span class="food-tag good">鸡胸肉</span><span class="food-tag good">牛肉</span><span class="food-tag good">鱼虾</span><span class="food-tag good">鸡蛋</span><span class="food-tag good">西兰花</span><span class="food-tag good">糙米</span>' : '<span class="food-tag good">鸡胸肉</span><span class="food-tag good">鱼虾</span><span class="food-tag good">菠菜</span><span class="food-tag good">豆腐</span><span class="food-tag good">燕麦</span><span class="food-tag good">红枣</span>';
    const avoid = isMale ? '<span class="food-tag avoid">啤酒</span><span class="food-tag avoid">炸鸡</span><span class="food-tag avoid">薯片</span><span class="food-tag avoid">白面包</span>' : '<span class="food-tag avoid">奶茶</span><span class="food-tag avoid">蛋糕</span><span class="food-tag avoid">薯片</span><span class="food-tag avoid">冰淇淋</span>';
    const tips = isMale ? [`每日热量控制在 <b>${targetCal} kcal</b>，比消耗少约 ${Math.round(tdee - targetCal)} kcal`,`蛋白质摄入较高（${proteinG}g），有助于保留肌肉、增强饱腹感`,`减少精制碳水，选择粗粮、薯类`,`烹饪方式优先蒸、煮、烤，避免油炸`,`每餐先吃蔬菜和蛋白质，最后吃主食`,`多喝水（每天 2~3L），避免含糖饮料和酒精`] : [`每日热量控制在 <b>${targetCal} kcal</b>，比消耗少约 ${Math.round(tdee - targetCal)} kcal`,`蛋白质摄入 ${proteinG}g，搭配铁质丰富的食物（菠菜、红肉、黑豆）`,`减脂期间每日热量不低于 1200 kcal，避免影响生理周期`,`选择低 GI 碳水（燕麦、糙米），保持血糖稳定`,`适量摄入健康脂肪（牛油果、坚果），脂肪占比 ${Math.round(fatPct*100)}% 有助于激素平衡`,`经期前后可适当增加 100~200 kcal，不必过度克制`];
    dietHTML = `<div class="diet-card warn"><div class="diet-title"><span class="icon">&#9888;</span> ${isMale ? '男性' : '女性'}减脂饮食建议</div><div class="macro-row"><div class="macro-item protein"><div class="val">${proteinG}g</div><div class="lbl">蛋白质</div></div><div class="macro-item carb"><div class="val">${carbG}g</div><div class="lbl">碳水</div></div><div class="macro-item fat"><div class="val">${fatG}g</div><div class="lbl">脂肪</div></div></div><div class="food-tags">${foods}${avoid}</div><ul class="diet-tips">${tips.map(t => '<li>' + t + '</li>').join('')}</ul></div>`;
  } else if (goal === 'gain') {
    const foods = isMale ? '<span class="food-tag good">牛肉</span><span class="food-tag good">鸡蛋</span><span class="food-tag good">牛奶</span><span class="food-tag good">坚果</span><span class="food-tag good">香蕉</span><span class="food-tag good">牛油果</span>' : '<span class="food-tag good">鸡蛋</span><span class="food-tag good">牛奶</span><span class="food-tag good">三文鱼</span><span class="food-tag good">坚果</span><span class="food-tag good">牛油果</span><span class="food-tag good">红枣</span>';
    const avoid = isMale ? '<span class="food-tag avoid">空热量零食</span><span class="food-tag avoid">碳酸饮料</span>' : '<span class="food-tag avoid">空热量零食</span><span class="food-tag avoid">油炸食品</span>';
    const tips = isMale ? [`每日热量达到 <b>${targetCal} kcal</b>，比消耗多约 ${Math.round(targetCal - tdee)} kcal`,`每天 4~5 餐，避免一次吃太多`,`蛋白质充足（${proteinG}g），碳水 ${carbG}g，为肌肉合成提供原料`,`训练后 30 分钟内补充蛋白质 + 碳水（如牛奶 + 香蕉）`,`补锌（牡蛎、牛肉、南瓜子），有助于维持 testosterone 水平`,`配合力量训练，确保增的是肌肉而非脂肪`] : [`每日热量达到 <b>${targetCal} kcal</b>，比消耗多约 ${Math.round(targetCal - tdee)} kcal`,`每天 4~5 餐，少食多餐更容易消化吸收`,`蛋白质 ${proteinG}g，搭配富含铁和钙的食物`,`选择营养密度高的食物（三文鱼、鸡蛋、坚果），而非空热量`,`适量健康脂肪（${fatG}g，占比 ${Math.round(fatPct*100)}%），支持激素分泌`,`配合力量训练塑形，增重同时保持体态匀称`];
    dietHTML = `<div class="diet-card"><div class="diet-title"><span class="icon">&#127860;</span> ${isMale ? '男性' : '女性'}增重饮食建议</div><div class="macro-row"><div class="macro-item protein"><div class="val">${proteinG}g</div><div class="lbl">蛋白质</div></div><div class="macro-item carb"><div class="val">${carbG}g</div><div class="lbl">碳水</div></div><div class="macro-item fat"><div class="val">${fatG}g</div><div class="lbl">脂肪</div></div></div><div class="food-tags">${foods}${avoid}</div><ul class="diet-tips">${tips.map(t => '<li>' + t + '</li>').join('')}</ul></div>`;
  } else {
    const foods = isMale ? '<span class="food-tag good">鱼肉</span><span class="food-tag good">鸡胸肉</span><span class="food-tag good">豆制品</span><span class="food-tag good">蔬菜</span><span class="food-tag good">全谷物</span><span class="food-tag good">坚果</span>' : '<span class="food-tag good">鱼肉</span><span class="food-tag good">豆腐</span><span class="food-tag good">菠菜</span><span class="food-tag good">水果</span><span class="food-tag good">酸奶</span><span class="food-tag good">坚果</span>';
    const avoid = isMale ? '<span class="food-tag avoid">过度加工食品</span><span class="food-tag avoid">高糖饮料</span>' : '<span class="food-tag avoid">过度加工食品</span><span class="food-tag avoid">高糖甜品</span>';
    const tips = isMale ? [`每日热量维持在 <b>${targetCal} kcal</b> 左右`,`三餐规律，早餐不可省略`,`每天摄入 300~500g 蔬菜，200~350g 水果`,`每周吃 2~3 次鱼类，补充优质蛋白和 Omega-3`,`补锌（牡蛎、牛肉）和维生素 D（晒太阳），维持身体机能`,`控制盐（&lt;5g/天）和油（&lt;25g/天）的摄入`] : [`每日热量维持在 <b>${targetCal} kcal</b> 左右`,`三餐规律，早餐不可省略，可搭配酸奶和水果`,`每天摄入 300~500g 蔬菜，200~350g 水果`,`补铁（红肉、菠菜、黑豆）和补钙（牛奶、豆腐），女性需求更高`,`适量摄入大豆制品，含天然植物雌激素，有益健康`,`控制盐（&lt;5g/天）和油（&lt;25g/天）的摄入`];
    dietHTML = `<div class="diet-card"><div class="diet-title"><span class="icon">&#9989;</span> ${isMale ? '男性' : '女性'}均衡饮食建议</div><div class="macro-row"><div class="macro-item protein"><div class="val">${proteinG}g</div><div class="lbl">蛋白质</div></div><div class="macro-item carb"><div class="val">${carbG}g</div><div class="lbl">碳水</div></div><div class="macro-item fat"><div class="val">${fatG}g</div><div class="lbl">脂肪</div></div></div><div class="food-tags">${foods}${avoid}</div><ul class="diet-tips">${tips.map(t => '<li>' + t + '</li>').join('')}</ul></div>`;
  }
  dietSection.innerHTML = dietHTML;

  await saveRecord({ date: new Date().toLocaleString('zh-CN'), bmi: +bmi.toFixed(1), bf: +bfClamped.toFixed(1), tdee: Math.round(tdee), whr: (waist && hip) ? +(waist/hip).toFixed(2) : null, weight: w, height: h, age: a, gender });
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });

// Init
(async () => {
  await initSupabase();
  const session = await getSession();
  if (session) {
    document.getElementById('userMenu').style.display = 'flex';
    document.getElementById('userEmail').textContent = session.user.email;
    checkAndOfferMigration();
  }
  await renderDashboard();
})();
</script>
