<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>健康助手 - 经期日历</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav>
  <a href="index.html" class="logo">健康助手</a>
  <div class="nav-links">
    <a href="index.html">身体数据</a>
    <a href="period.html" class="active">经期日历</a>
    <a href="history.html">历史记录</a>
    <a href="analysis.html">AI 分析</a>
  </div>
</nav>

<div class="card">
  <h1>经期日历</h1>
  <p class="subtitle">记录周期 · 症状追踪 · 阶段建议</p>

  <div class="cal-header">
    <button onclick="calNav(-1)">&larr; 上月</button>
    <span class="month-label" id="calMonth"></span>
    <button onclick="calNav(1)">下月 &rarr;</button>
  </div>
  <div class="cal-weekdays"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
  <div id="calHint" style="text-align:center;font-size:.72em;color:#e91e63;margin-bottom:8px;min-height:16px"></div>
  <div class="cal-grid" id="calGrid"></div>
  <div class="stats-row" id="calStats"></div>
  <div class="action-panel" id="actionPanel"></div>
  <div id="calLegend" style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;font-size:.68em;color:#888;margin-bottom:12px">
    <span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:#e91e63;vertical-align:middle;margin-right:3px"></span>经期</span>
    <span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:#f48fb1;opacity:.5;vertical-align:middle;margin-right:3px;border:1.5px dashed #f48fb1"></span>预测经期</span>
    <span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:#e3f2fd;vertical-align:middle;margin-right:3px"></span>排卵期</span>
    <span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:#fff3e0;vertical-align:middle;margin-right:3px"></span>危险期</span>
    <span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:#e8f5e9;vertical-align:middle;margin-right:3px"></span>安全期</span>
  </div>
  <div id="phaseAdvice"></div>
  <div class="symptom-panel" id="symptomPanel">
    <div class="symptom-date" id="symDate"></div>
    <div class="symptom-section">
      <div class="lbl">经量</div>
      <div class="symptom-tags" id="flowTags"></div>
    </div>
    <div class="symptom-section">
      <div class="lbl">症状（可多选）</div>
      <div class="symptom-tags" id="symTags"></div>
    </div>
    <div class="symptom-section">
      <div class="lbl">心情</div>
      <div class="symptom-tags" id="moodTags"></div>
    </div>
    <div class="symptom-section">
      <div class="lbl">精力等级</div>
      <div class="symptom-tags" id="energyTags"></div>
    </div>
    <div class="symptom-section">
      <div class="lbl">痛经程度</div>
      <div class="symptom-tags" id="crampsTags"></div>
    </div>
    <div class="symptom-row">
      <div class="symptom-section" style="flex:1">
        <div class="lbl">睡眠（小时）</div>
        <input type="number" id="sleepInput" min="0" max="24" step="0.5" placeholder="如 7.5" style="width:100%;padding:8px 10px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:.82em;outline:none">
      </div>
      <div class="symptom-section" style="flex:1">
        <div class="lbl">体重（kg）</div>
        <input type="number" id="weightInput" min="20" max="300" step="0.1" placeholder="可选" style="width:100%;padding:8px 10px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:.82em;outline:none">
      </div>
    </div>
    <div class="symptom-section">
      <div class="lbl">运动</div>
      <div class="symptom-tags" id="exerciseTags"></div>
      <input type="number" id="exerciseMinInput" min="0" max="600" step="5" placeholder="时长（分钟）" style="width:100%;padding:8px 10px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:.82em;outline:none;margin-top:6px">
    </div>
    <div class="symptom-section">
      <div class="lbl">饮食备注</div>
      <input type="text" id="dietInput" placeholder="如：红糖姜茶、冰淇淋..." style="width:100%;padding:8px 10px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:.82em;outline:none">
    </div>
    <div class="symptom-section">
      <div class="lbl">每日备注</div>
      <input type="text" id="notesInput" placeholder="其他想记录的..." style="width:100%;padding:8px 10px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:.82em;outline:none">
    </div>
    <button class="sym-save-btn" onclick="saveSymptom()">保存</button>
  </div>
</div>

<script>
const SYMPTOMS = ['痛经','头痛','疲劳','情绪波动','腰酸','食欲变化','乳房胀痛','失眠','腹胀','水肿','恶心','腹泻','痘痘','注意力下降','畏寒','嗜甜'];
const MOODS = ['😊 正常','😔 低落','😤 烦躁','😴 嗜睡','🥰 愉快','😰 焦虑','😭 哭泣倾向','🤯 压力大'];
const FLOWS = ['无','微量','少量','中等','大量'];
const EXERCISES = ['无','散步','瑜伽','跑步','游泳','力量训练','其他'];
let calYear, calMonth, selectedDate = null;

function getPeriodData() {
  try { return JSON.parse(localStorage.getItem('period_data') || '{"periods":[],"symptoms":{}}'); }
  catch { return { periods: [], symptoms: {} }; }
}
function savePeriodData(d) { localStorage.setItem('period_data', JSON.stringify(d)); }

function initCal() {
  const now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();
}

function calNav(dir) {
  calMonth += dir;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

function renderCalendar() {
  const data = getPeriodData();
  const periodSet = new Set(data.periods);
  const today = new Date();
  const todayStr = fmt(today);

  document.getElementById('calMonth').textContent = `${calYear}年${calMonth + 1}月`;
  document.getElementById('calHint').textContent = '点击日期设置月经开始或结束';

  const first = new Date(calYear, calMonth, 1);
  const last = new Date(calYear, calMonth + 1, 0);
  const startDay = first.getDay();

  const predictions = getPredictions(data);
  const predSet = new Set(predictions.predicted);
  const ovuSet = new Set(predictions.ovulation);
  const safeSet = new Set(predictions.safe);
  const dangerSet = new Set(predictions.danger);

  let html = '';
  for (let i = 0; i < startDay; i++) html += '<div class="cal-day empty"></div>';
  for (let d = 1; d <= last.getDate(); d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    let cls = 'cal-day';
    if (dateStr === todayStr) cls += ' today';
    if (periodSet.has(dateStr)) {
      cls += ' period';
      const rec = data.symptoms[dateStr];
      if (rec && rec.flow) cls += ' flow-' + FLOWS.indexOf(rec.flow);
    } else if (predSet.has(dateStr)) {
      cls += ' predicted';
    } else if (dangerSet.has(dateStr)) {
      cls += ' danger';
    } else if (safeSet.has(dateStr)) {
      cls += ' safe';
    }
    if (ovuSet.has(dateStr)) cls += ' ovulation';
    if (data.symptoms[dateStr]) cls += ' symptom-dot';
    if (selectedDate === dateStr) cls += ' period-start';
    html += `<div class="${cls}" onclick="showPeriodActions('${dateStr}')"><span class="day-num">${d}</span></div>`;
  }
  document.getElementById('calGrid').innerHTML = html;

  const stats = getStats(data);
  const cycle = stats.avgCycle || 30;
  const preDays = Math.round(7 * cycle / 30);
  const postDays = Math.round(8 * cycle / 30);
  const nextPeriod = predictions.nextPeriod;
  const daysUntil = nextPeriod ? Math.ceil((new Date(nextPeriod) - today) / 86400000) : null;
  const monthPrefix = `${calYear}-${String(calMonth+1).padStart(2,'0')}`;
  const monthDays = data.periods.filter(d => d.startsWith(monthPrefix)).length;
  document.getElementById('calStats').innerHTML = `
    <div class="stats-card"><div class="val">${cycle}</div><div class="lbl">平均周期（天）</div></div>
    <div class="stats-card"><div class="val">${stats.avgDuration || '--'}</div><div class="lbl">平均经期（天）</div></div>
    <div class="stats-card"><div class="val">${preDays}+${postDays}</div><div class="lbl">安全期（前+后）</div></div>
    <div class="stats-card"><div class="val">${daysUntil !== null && daysUntil >= 0 ? daysUntil + '天' : '--'}</div><div class="lbl">距下次经期</div></div>
  `;

  renderPhaseAdvice(data, predictions, today);
}

function fmt(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// --- Period action button logic ---
function getPeriodRange(data) {
  if (!data.periods.length) return { start: null, end: null };
  const sorted = [...data.periods].sort();
  return { start: sorted[0], end: sorted[sorted.length - 1] };
}

function fillRange(data, startStr, endStr) {
  const start = new Date(startStr);
  const end = new Date(endStr);
  if (end < start) return;
  const d = new Date(start);
  while (d <= end) {
    const ds = fmt(d);
    if (!data.periods.includes(ds)) data.periods.push(ds);
    d.setDate(d.getDate() + 1);
  }
  data.periods.sort();
}

function removeOutsideRange(data, keepStart, keepEnd) {
  data.periods = data.periods.filter(d => d >= keepStart && d <= keepEnd);
}

function showPeriodActions(dateStr) {
  const today = new Date();
  today.setHours(0,0,0,0);
  if (new Date(dateStr) > today) return;

  const data = getPeriodData();
  const range = getPeriodRange(data);
  const hasStart = !!range.start;
  const hasEnd = !!range.end;
  const selDate = dateStr;

  let startDisabled = false, startHint = '';
  let endDisabled = false, endHint = '';

  if (hasStart && hasEnd) {
    // Scenario 3: both set
    if (selDate === range.start) {
      startHint = '重置开始日'; endHint = '清除全部，设为结束日';
    } else if (selDate === range.end) {
      startHint = '清除全部，设为开始日'; endHint = '重置结束日';
    } else if (selDate > range.start && selDate < range.end) {
      startHint = '缩短至新开始日'; endHint = '缩短至新结束日';
    } else if (selDate < range.start) {
      const preDays = Math.round(7 * (getStats(data).avgCycle || 30) / 30);
      if ((new Date(range.start) - new Date(selDate)) / 86400000 <= preDays + 1) {
        startHint = '延长经期开始'; endHint = '清除全部，仅保留结束日';
      } else {
        startHint = '设为新周期开始日'; endHint = '清除全部，仅保留结束日';
      }
    } else {
      const postDays = Math.round(8 * (getStats(data).avgCycle || 30) / 30);
      if ((new Date(selDate) - new Date(range.end)) / 86400000 <= postDays + 1) {
        startHint = '清除全部，仅保留开始日'; endHint = '延长经期结束';
      } else {
        startHint = '清除全部，仅保留开始日'; endHint = '设为新周期结束日';
      }
    }
  } else if (hasStart && !hasEnd) {
    // Scenario 4: only start set
    if (selDate < range.start) {
      startHint = '提前开始日'; endHint = '结束日需晚于开始日'; endDisabled = true;
    } else if (selDate === range.start) {
      startHint = '取消开始日'; endHint = '改设为结束日';
    } else {
      startHint = '推迟开始日'; endHint = '设为结束日，计算周期';
    }
  } else if (!hasStart && hasEnd) {
    // Scenario 5: only end set
    if (selDate < range.end) {
      startHint = '设为开始日，计算周期'; endHint = '缩短结束日';
    } else if (selDate === range.end) {
      startHint = '设为开始日'; endHint = '取消结束日';
    } else {
      startHint = '开始日需早于结束日'; startDisabled = true; endHint = '推迟结束日';
    }
  } else {
    // Scenario 2: nothing set
    startHint = '设为经期开始日'; endHint = '设为经期结束日';
  }

  selectedDate = selDate;
  const panel = document.getElementById('actionPanel');
  const isPeriodDay = data.periods.includes(selDate);
  panel.innerHTML = `
    <div style="font-size:.82em;color:#555;margin-bottom:8px;text-align:center">
      <b>${selDate}</b>
      ${hasStart ? ' · 当前开始：' + range.start : ''}${hasEnd ? ' · 当前结束：' + range.end : ''}
    </div>
    <div style="display:flex;gap:10px">
      <button class="action-btn action-start" onclick="doSetStart()" ${startDisabled ? 'disabled' : ''}>
        <span style="font-size:1.1em">&#128309;</span> 月经开始
        <div style="font-size:.7em;opacity:.8;margin-top:2px">${startHint}</div>
      </button>
      <button class="action-btn action-end" onclick="doSetEnd()" ${endDisabled ? 'disabled' : ''}>
        <span style="font-size:1.1em">&#128310;</span> 月经结束
        <div style="font-size:.7em;opacity:.8;margin-top:2px">${endHint}</div>
      </button>
    </div>
    ${isPeriodDay ? '<button class="action-btn" style="width:100%;margin-top:8px;background:#f5f5f5;color:#555" onclick="openSymptomFromAction()">记录症状</button>' : ''}
    <button style="width:100%;margin-top:8px;padding:6px;border:none;background:none;color:#999;font-size:.75em;cursor:pointer" onclick="hideActions()">取消</button>
  `;
  panel.classList.add('show');
  document.getElementById('symptomPanel').classList.remove('show');
}

function hideActions() {
  selectedDate = null;
  document.getElementById('actionPanel').classList.remove('show');
  renderCalendar();
}

function openSymptomFromAction() {
  const dateStr = selectedDate;
  document.getElementById('actionPanel').classList.remove('show');
  showSymptomPanel(dateStr, getPeriodData());
}

function doSetStart() {
  const data = getPeriodData();
  const range = getPeriodRange(data);
  const sel = selectedDate;

  if (!range.start && !range.end) {
    // Nothing set → set start only
    data.periods = [sel];
  } else if (range.start && !range.end) {
    // Only start set
    if (sel < range.start) {
      // 4-1: move start earlier
      data.periods = [sel];
    } else if (sel === range.start) {
      // 4-2: cancel start
      data.periods = [];
    } else {
      // 4-3: move start later
      data.periods = [sel];
    }
  } else if (!range.start && range.end) {
    // Only end set
    if (sel > range.end) {
      // 5-3: invalid
      hideActions(); return;
    }
    // 5-1, 5-2: set start + fill
    data.periods = [sel];
    fillRange(data, sel, range.end);
  } else {
    // Both set (scenario 3)
    if (sel === range.start) {
      // 3-1: keep end only
      data.periods = [range.end];
    } else if (sel === range.end) {
      // 3-2: set as new start
      data.periods = [sel];
    } else if (sel > range.start && sel < range.end) {
      // 3-3: new start, keep end
      removeOutsideRange(data, sel, range.end);
    } else if (sel < range.start) {
      // 3-4: extend start earlier, keep end
      data.periods = [sel];
      fillRange(data, sel, range.end);
    } else {
      // 3-5: keep start only
      data.periods = [range.start];
    }
  }
  savePeriodData(data);
  hideActions();
}

function doSetEnd() {
  const data = getPeriodData();
  const range = getPeriodRange(data);
  const sel = selectedDate;

  if (!range.start && !range.end) {
    // Nothing set → set end only
    data.periods = [sel];
  } else if (range.start && !range.end) {
    // Only start set
    if (sel < range.start) {
      // 4-1: invalid
      alert('月经结束时间需要大于月经开始时间'); return;
    } else if (sel === range.start) {
      // 4-2: swap to end
      data.periods = [sel];
    } else {
      // 4-3: set end + fill
      data.periods = [range.start];
      fillRange(data, range.start, sel);
    }
  } else if (!range.start && range.end) {
    // Only end set
    if (sel < range.end) {
      // 5-1: new end earlier
      data.periods = [sel];
    } else if (sel === range.end) {
      // 5-2: cancel end
      data.periods = [];
    } else {
      // 5-3: move end later
      data.periods = [sel];
    }
  } else {
    // Both set (scenario 3)
    if (sel === range.start) {
      // 3-1: clear all, set as end
      data.periods = [sel];
    } else if (sel === range.end) {
      // 3-2: keep start only
      data.periods = [range.start];
    } else if (sel > range.start && sel < range.end) {
      // 3-3: keep start, new end
      removeOutsideRange(data, range.start, sel);
    } else if (sel < range.start) {
      // 3-4: keep end only
      data.periods = [range.end];
    } else {
      // 3-5: extend end later, keep start
      data.periods = [range.start];
      fillRange(data, range.start, sel);
    }
  }
  savePeriodData(data);
  hideActions();
}

function getPeriodGroups(data) {
  if (!data.periods.length) return [];
  const sorted = [...data.periods].sort();
  const groups = [[sorted[0]]];
  for (let i = 1; i < sorted.length; i++) {
    const prev = new Date(sorted[i-1]);
    const curr = new Date(sorted[i]);
    const diff = (curr - prev) / 86400000;
    if (diff <= 2) groups[groups.length - 1].push(sorted[i]);
    else groups.push([sorted[i]]);
  }
  return groups;
}

function getStats(data) {
  const groups = getPeriodGroups(data);
  if (groups.length < 2) {
    const avgDuration = groups.length ? groups[0].length : null;
    return { avgCycle: null, avgDuration };
  }
  const cycles = [];
  for (let i = 1; i < groups.length; i++) {
    const diff = (new Date(groups[i][0]) - new Date(groups[i-1][0])) / 86400000;
    if (diff > 15 && diff < 60) cycles.push(diff);
  }
  const durations = groups.map(g => g.length);
  return {
    avgCycle: cycles.length ? Math.round(cycles.reduce((a,b) => a+b, 0) / cycles.length) : null,
    avgDuration: Math.round(durations.reduce((a,b) => a+b, 0) / durations.length)
  };
}

function getPredictions(data) {
  const groups = getPeriodGroups(data);
  const stats = getStats(data);
  const result = { predicted: [], ovulation: [], nextPeriod: null, safe: [], danger: [] };
  if (!groups.length) return result;

  const cycle = stats.avgCycle || 30;
  const duration = stats.avgDuration || 5;
  const today = new Date();
  today.setHours(0,0,0,0);
  const lastStart = new Date(groups[groups.length - 1][0]);
  const lastEnd = new Date(groups[groups.length - 1][groups[groups.length - 1].length - 1]);

  // Find the next future period
  let nextStart = new Date(lastStart);
  while (nextStart <= today) {
    nextStart.setDate(nextStart.getDate() + cycle);
  }
  result.nextPeriod = fmt(nextStart);

  // Predict next 3 future periods
  for (let p = 0; p < 3; p++) {
    const pStart = new Date(lastStart);
    pStart.setDate(pStart.getDate() + cycle * (p + 1));
    if (pStart <= today) continue;
    const pEnd = new Date(pStart);
    pEnd.setDate(pEnd.getDate() + duration - 1);

    for (let d = 0; d < duration; d++) {
      const dd = new Date(pStart);
      dd.setDate(dd.getDate() + d);
      if (dd > today) result.predicted.push(fmt(dd));
    }

    // Ovulation: ~14 days before next period
    const ovu = new Date(pStart);
    ovu.setDate(ovu.getDate() - 14);
    for (let d = -1; d <= 1; d++) {
      const od = new Date(ovu);
      od.setDate(od.getDate() + d);
      if (od > today) result.ovulation.push(fmt(od));
    }

    // Safe period: 前7后8 (proportional to cycle length)
    const preDays = Math.round(7 * cycle / 30);
    const postDays = Math.round(8 * cycle / 30);

    // Pre-period safe: 7 days before period start
    for (let d = 1; d <= preDays; d++) {
      const sd = new Date(pStart);
      sd.setDate(sd.getDate() - d);
      if (sd > today) result.safe.push(fmt(sd));
    }
    // Post-period safe: 8 days after period end
    for (let d = 1; d <= postDays; d++) {
      const sd = new Date(pEnd);
      sd.setDate(sd.getDate() + d);
      if (sd > today) result.safe.push(fmt(sd));
    }
    // Danger: between post-safe end and pre-safe start (ovulation window)
    const dangerStart = new Date(pEnd);
    dangerStart.setDate(dangerStart.getDate() + postDays + 1);
    const dangerEnd = new Date(pStart);
    dangerEnd.setDate(dangerEnd.getDate() - preDays - 1);
    const dd = new Date(dangerStart);
    while (dd <= dangerEnd) {
      if (dd > today) result.danger.push(fmt(dd));
      dd.setDate(dd.getDate() + 1);
    }
  }
  return result;
}

function showSymptomPanel(dateStr, data) {
  const panel = document.getElementById('symptomPanel');
  panel.classList.add('show');
  document.getElementById('symDate').textContent = dateStr + ' 症状记录';
  const record = data.symptoms[dateStr] || { symptoms: [], mood: '', flow: '', energy: 0, cramps: 0, sleep: '', weight: '', exercise: '', exerciseMin: '', diet: '', notes: '' };
  document.getElementById('flowTags').innerHTML = FLOWS.map(f =>
    `<span class="sym-tag flow-${FLOWS.indexOf(f)} ${record.flow === f ? 'active' : ''}" onclick="toggleSingle(this)">${f}</span>`
  ).join('');
  document.getElementById('symTags').innerHTML = SYMPTOMS.map(s =>
    `<span class="sym-tag ${record.symptoms.includes(s) ? 'active' : ''}" onclick="this.classList.toggle('active')">${s}</span>`
  ).join('');
  document.getElementById('moodTags').innerHTML = MOODS.map(m =>
    `<span class="sym-tag mood ${record.mood === m ? 'active' : ''}" onclick="toggleMood(this)">${m}</span>`
  ).join('');
  document.getElementById('energyTags').innerHTML = [1,2,3,4,5].map(e =>
    `<span class="sym-tag energy-${e} ${record.energy === e ? 'active' : ''}" onclick="toggleSingle(this)">${e === 1 ? '1 极度疲惫' : e === 2 ? '2 疲惫' : e === 3 ? '3 一般' : e === 4 ? '4 较好' : '5 充沛'}</span>`
  ).join('');
  document.getElementById('crampsTags').innerHTML = [0,1,2,3,4,5].map(c =>
    `<span class="sym-tag cramps-${c} ${record.cramps === c ? 'active' : ''}" onclick="toggleSingle(this)">${c === 0 ? '0 无痛' : c <= 2 ? c + ' 轻微' : c <= 3 ? c + ' 中度' : c + ' 剧烈'}</span>`
  ).join('');
  document.getElementById('exerciseTags').innerHTML = EXERCISES.map(ex =>
    `<span class="sym-tag ${record.exercise === ex ? 'active' : ''}" onclick="toggleSingle(this)">${ex}</span>`
  ).join('');
  document.getElementById('sleepInput').value = record.sleep || '';
  document.getElementById('weightInput').value = record.weight || '';
  document.getElementById('exerciseMinInput').value = record.exerciseMin || '';
  document.getElementById('dietInput').value = record.diet || '';
  document.getElementById('notesInput').value = record.notes || '';
  panel._dateStr = dateStr;
}

function toggleSingle(el) {
  el.parentElement.querySelectorAll('.sym-tag').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

function toggleMood(el) {
  el.parentElement.querySelectorAll('.sym-tag').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

function saveSymptom() {
  const panel = document.getElementById('symptomPanel');
  const dateStr = panel._dateStr;
  const data = getPeriodData();
  const symptoms = [];
  document.getElementById('symTags').querySelectorAll('.sym-tag.active').forEach(t => symptoms.push(t.textContent));
  const moodEl = document.getElementById('moodTags').querySelector('.sym-tag.active');
  const mood = moodEl ? moodEl.textContent : '';
  const flowEl = document.getElementById('flowTags').querySelector('.sym-tag.active');
  const flow = flowEl ? flowEl.textContent : '';
  const energyEl = document.getElementById('energyTags').querySelector('.sym-tag.active');
  const energy = energyEl ? parseInt(energyEl.textContent) : 0;
  const crampsEl = document.getElementById('crampsTags').querySelector('.sym-tag.active');
  const cramps = crampsEl ? parseInt(crampsEl.textContent) : 0;
  const sleep = document.getElementById('sleepInput').value;
  const weight = document.getElementById('weightInput').value;
  const exerciseEl = document.getElementById('exerciseTags').querySelector('.sym-tag.active');
  const exercise = exerciseEl ? exerciseEl.textContent : '';
  const exerciseMin = document.getElementById('exerciseMinInput').value;
  const diet = document.getElementById('dietInput').value.trim();
  const notes = document.getElementById('notesInput').value.trim();
  const hasData = symptoms.length || mood || flow || energy || cramps || sleep || weight || exercise || diet || notes;
  if (hasData) {
    data.symptoms[dateStr] = { symptoms, mood, flow, energy, cramps, sleep, weight, exercise, exerciseMin, diet, notes };
  } else {
    delete data.symptoms[dateStr];
  }
  savePeriodData(data);
  renderCalendar();
  panel.classList.remove('show');
}

function renderPhaseAdvice(data, predictions, today) {
  const container = document.getElementById('phaseAdvice');
  const groups = getPeriodGroups(data);
  if (!groups.length || !predictions.nextPeriod) {
    container.innerHTML = '<div style="text-align:center;color:#bbb;font-size:.82em;padding:16px">标记经期日后显示阶段建议</div>';
    return;
  }
  const stats = getStats(data);
  const cycle = stats.avgCycle || 28;
  const lastStart = new Date(groups[groups.length - 1][0]);
  const dayInCycle = Math.floor((today - lastStart) / 86400000) + 1;

  let cls, icon, title, advice;
  if (dayInCycle <= (stats.avgDuration || 5)) {
    cls = 'phase-period'; icon = '🩸'; title = '经期（第' + dayInCycle + '天）';
    advice = '<b>饮食：</b>多吃红肉、菠菜、红枣等补铁食物，喝温热的红糖姜茶，避免生冷食物。<br><b>运动：</b>轻度运动为主，如散步、拉伸、瑜伽，避免高强度训练。<br><b>注意：</b>保证充足睡眠，注意保暖，可热敷缓解痛经。';
  } else if (dayInCycle <= cycle - 14 - 4) {
    cls = 'phase-follicular'; icon = '🌱'; title = '卵泡期（第' + dayInCycle + '天）';
    advice = '<b>饮食：</b>高蛋白饮食（鸡胸肉、鱼虾、鸡蛋），补充绿叶蔬菜和全谷物，减脂黄金期。<br><b>运动：</b>有氧运动效果最佳，可安排跑步、游泳、HIIT。<br><b>注意：</b>精力充沛，适合安排高强度工作和运动。';
  } else if (dayInCycle <= cycle - 14 + 2) {
    cls = 'phase-ovulation'; icon = '🥚'; title = '排卵期（第' + dayInCycle + '天）';
    advice = '<b>饮食：</b>补充维生素 E（坚果、牛油果）和 Omega-3（深海鱼），多吃十字花科蔬菜。<br><b>运动：</b>运动量可适当加大，力量训练效果好。<br><b>注意：</b>体温可能略升高，分泌物增多属正常现象。';
  } else {
    cls = 'phase-luteal'; icon = '🌙'; title = '黄体期（第' + dayInCycle + '天）';
    advice = '<b>饮食：</b>补充钙和镁（牛奶、香蕉、深色蔬菜），控制食欲，可适当吃黑巧克力。<br><b>运动：</b>选择舒缓运动（瑜伽、游泳、快走），避免过度刺激。<br><b>注意：</b>可能出现 PMS 症状，保持规律作息，减少咖啡因摄入。';
  }
  container.innerHTML = `<div class="phase-card ${cls}"><div class="phase-title">${icon} ${title}</div>${advice}</div>`;
}

initCal();
renderCalendar();
</script>
